<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Travel Conversations</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="splash-screen" class="screen">
        <div class="content-wrapper">
            <div class="image-box"><img src="logo.png" alt="App Logo" id="main-logo"></div>
            <button id="btn-start" class="action-btn-large">START LESSONS</button>
        </div>
    </div>

    <div id="instructions-screen" class="screen hidden">
        <div class="content-wrapper">
            <div class="image-box"><img src="instructions.png" alt="Instructions" id="instructions-img"></div>
            <button id="btn-enter" class="action-btn-large">ENTER APP</button>
        </div>
    </div>

    <div id="lobby-screen" class="screen hidden">
        <h1 id="app-title" style="color: #ccff00; font-size: 40px; margin-bottom: 30px;">Top 21 Lessons</h1>
        <div id="lobby-container"></div>
    </div>

    <div id="sub-screen" class="screen hidden">
        <h2 id="sub-title" style="color: #ccff00; font-size: 32px; margin-bottom: 20px;"></h2>
        <div id="sub-container" class="grid-container"></div>
        <button id="btn-back-grid" class="back-btn" style="margin-top: 30px;">⬅ BACK TO MODULES</button>
    </div>

    <div id="player-zone" class="screen hidden">
        <h2 id="now-playing-title" style="color:#ccff00; font-size: 28px; margin-bottom: 20px; line-height: 1.3;"></h2>
        
        <audio id="audio-player" controls controlsList="nodownload" style="width: 100%; max-width: 450px; margin: 0 auto 20px auto; display: block; border-radius: 50px; border: 2px solid #ccff00; background: #111;"></audio>
        
        <div class="audio-controls">
            <button id="ctrl-play" class="ctrl-btn">▶ PLAY</button>
            <button id="ctrl-pause" class="ctrl-btn">⏸ PAUSE</button>
            <button id="ctrl-stop" class="ctrl-btn">⏹ STOP</button>
        </div>
        
        <div class="learning-buttons">
            <button id="btn-blind" class="mode-btn neon-blue">🎧 LISTEN BLIND</button>
            <button id="btn-read" class="mode-btn neon-green">📖 LISTEN + READ</button>
            <button id="btn-game" class="mode-btn neon-pink">🎮 MATCH GAME</button>
            <button id="btn-bowling" class="mode-btn neon-yellow">🎳 BOWLING QUIZ</button>
        </div>
        
        <div id="game-zone" class="hidden">
            <div id="game-board"></div>
            <div id="quiz-feedback-area"></div>
        </div>
        
        <div id="transcript-box" class="hidden"></div>
        <button id="btn-back-sub" class="back-btn" style="margin-top: 30px;">⬅ BACK TO LESSONS</button>
    </div>

    <div id="translation-popup" class="hidden"></div>

    <script src="data.js"></script>
    <script src="script.js"></script>
</body>
</html>
